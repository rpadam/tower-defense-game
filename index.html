<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower Defense | Raphael Adam</title>
  </head>
  <body>
    <main class="app-shell">
      <h1>Path Shift TD</h1>
      <p class="subtitle">Defend the core, adapt to lane shifts, and trigger overdrive for clutch saves.</p>
      <canvas id="game-canvas" width="960" height="540" aria-label="Tower defense game canvas"></canvas>
      <p class="help-text">
        Controls: Click to place tower, <kbd>1</kbd>/<kbd>2</kbd>/<kbd>3</kbd> select tower,
        <kbd>N</kbd> start wave, <kbd>O</kbd> overdrive, <kbd>F</kbd> fullscreen, <kbd>R</kbd> restart.
      </p>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
